format:
  html:
    theme:
      light: [cosmo, assets/custom.scss]
    toc: true
    toc-depth: 3
    number-sections: false
    code-fold: false
    code-tools: false
    code-link: false
    fig-align: center
    fig-cap-location: bottom
    tbl-cap-location: top
    df-print: paged
    include-in-header:
      text: |
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Source+Sans+3:wght@300;400;600&family=JetBrains+Mono&display=swap" rel="stylesheet">

execute:
  warning: false
  message: false
  echo: true
  cache: false

knitr:
  opts_chunk:
    fig.width: 9
    fig.height: 5.5
    dpi: 150
    out.width: "100%"
    comment: "#>"
